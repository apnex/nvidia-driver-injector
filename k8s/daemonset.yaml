# DaemonSet to deploy the nvidia-driver-injector on every node in a k3s /
# Kubernetes cluster. One pod per node; the pod builds + loads the patched
# nvidia.ko into the node's host kernel, then writes node labels so consumer
# Deployments can gate on driver readiness.
#
# This is the canonical PRODUCTION deployment path. The docker-compose path at
# the repo root remains supported for dev / single-host operator use; see
# docs/install-workflow.md for the Path A vs Path B split.
#
# Consumer contract (what to put on your vLLM / workload Deployment):
#   spec.nodeSelector:    nvidia.driver/state: ready
#   spec.runtimeClassName: nvidia
#   spec.containers[].env: NVIDIA_VISIBLE_DEVICES=all
#                          NVIDIA_DRIVER_CAPABILITIES=compute,utility
# Full contract + failure modes + worked example: docs/consumer-contract.md.
#
# Prerequisites on each node (one-shot host bring-up):
#   sudo scripts/apply.sh
# This installs the kernel cmdline, modprobe.d, bridge-link-cap service,
# udev rules, and on k3s hosts also configures the containerd nvidia runtime +
# creates the cluster-side RuntimeClass.
#
# Apply:
#   kubectl apply -f k8s/daemonset.yaml
#   kubectl rollout status daemonset/nvidia-driver-injector -n kube-system
#
# Verify:
#   kubectl get nodes -L nvidia.driver/state,nvidia.driver/version
#   # expect:  NAME   STATE  VERSION
#   #          obpc   ready  595.71.05-aorus.17
#
# Image:
#   apnex/nvidia-driver-injector:595.71.05-aorus.17 (built locally with
#   `docker build`; on k3s, import to containerd with
#   `docker save <image> | sudo k3s ctr images import -`).
#   imagePullPolicy=IfNotPresent so a missing registry never blocks startup.

---
# ---------------------------------------------------------------------------
# RBAC — SA + ClusterRole + ClusterRoleBinding for node-label writes.
# The entrypoint runs `kubectl label nodes <self> nvidia.driver/state=ready`
# after a successful module load, and unconditionally removes both labels in
# the `uninstall` subcommand. That requires `patch` on the `nodes` resource.
# ---------------------------------------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nvidia-driver-injector
  namespace: kube-system

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: nvidia-driver-injector
rules:
  # `patch` is enough to add / remove labels via `kubectl label`. `get` is
  # used by the entrypoint to read back the post-write state for the log line.
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: nvidia-driver-injector
subjects:
  - kind: ServiceAccount
    name: nvidia-driver-injector
    namespace: kube-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: nvidia-driver-injector

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvidia-driver-injector
  namespace: kube-system
  labels:
    app.kubernetes.io/name: nvidia-driver-injector
    app.kubernetes.io/component: kernel-driver
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: nvidia-driver-injector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nvidia-driver-injector
        app.kubernetes.io/component: kernel-driver
    spec:
      serviceAccountName: nvidia-driver-injector
      # Run on every node. Single-node host today; if you later add nodes
      # without an eGPU, add a nodeSelector here. The container exits cleanly
      # at the PCI gate when no matching GPU is found, so a stray pod on a
      # GPU-less node is harmless (it sleeps + restarts; never labels).
      nodeSelector: {}
      # PC-6a: NVIDIA-canonical toleration. Every NVIDIA operand pod in
      # gpu-operator uses exactly this toleration (G2 audit). Tighter
      # than 'operator: Exists' (which tolerates ALL taints) — accepts
      # only the canonical nvidia.com/gpu:NoSchedule taint admins use
      # to fence GPU nodes.
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      # hostPID so modprobe / depmod / udevadm see the host's process + module
      # namespace; without it `grep ^nvidia /proc/modules` reads the
      # container's PID-1 view and reports nothing.
      hostPID: true
      # hostNetwork is NOT required (the API server is reachable via the
      # in-cluster Service DNS that kubelet injects), but kubectl needs the
      # KUBERNETES_SERVICE_HOST env that the pod gets automatically. Leave
      # hostNetwork off to keep the pod's network namespace small.
      containers:
        - name: driver
          image: apnex/nvidia-driver-injector:595.71.05-apnex.29
          imagePullPolicy: IfNotPresent
          # Privileged + SYS_MODULE — load kernel modules + write PCI sysfs.
          # Same security posture as NVIDIA's own driver DaemonSet.
          securityContext:
            privileged: true
          # Pod-level injection: tell the entrypoint to write the node label
          # after a successful load (and remove it on `uninstall`). Off-switch:
          # set to "0" if you want to run the injector standalone without
          # touching cluster state (e.g. for debugging on a single node).
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: INJECTOR_WRITE_NODE_LABEL
              value: "1"
          volumeMounts:
            # Bind-mounts mirror docker-compose.yml so behaviour is identical
            # across the two deployment paths.
            - { name: lib-modules,   mountPath: /lib/modules }
            - { name: usr-src,       mountPath: /usr/src,         readOnly: true }
            - { name: sys,           mountPath: /sys }
            - { name: proc,          mountPath: /proc }
            - { name: dev,           mountPath: /dev }
            - { name: etc-modprobe,  mountPath: /etc/modprobe.d,  readOnly: true }
            - { name: etc-group,     mountPath: /etc/group,       readOnly: true }
            - { name: lib-firmware,  mountPath: /lib/firmware }
            # PC-3: readiness state file on host tmpfs. Visible to other
            # pods (device plugin initContainer reads it for startup
            # ordering) and to must-gather.sh on the host.
            - { name: pc3-state,     mountPath: /run/nvidia/injector }
          # PC-3: clean up the readiness file on intentional pod shutdown
          # so the absence signals "not ready" to consumers. Host reboot
          # also clears it via tmpfs semantics; preStop covers the
          # `kubectl delete pod` case.
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - 'rm -f /run/nvidia/injector/state'
          # PC-1: startupProbe ONLY (no livenessProbe).
          # NVIDIA gpu-operator PR #1317 explicitly retired lsmod-based
          # livenessProbes because they cause undesirable container restarts
          # that leave the driver daemonset in a bad state. Match their
          # pattern: gate startup, then trust the FS readiness oracle
          # (PC-3 /run/nvidia/injector/state) for runtime state.
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - '[ -f /run/nvidia/injector/state ] && grep -q ''"phase":"ready"'' /run/nvidia/injector/state'
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            # 120 × 10s = 1200s = 20 min budget for cold modprobe + init.
            # Matches NVIDIA driver container's startupProbe budget.
            failureThreshold: 120
          # Readiness: same check, faster cadence. Pod READY is what kubelet
          # surfaces as the DaemonSet `numberReady` count; consumers should
          # rely on the node LABEL (set by the entrypoint after the full
          # load + bind + perms + persistence-engage sequence), not on pod
          # READY alone.
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - '[ -e /sys/module/nvidia/version ]'
            initialDelaySeconds: 120
            periodSeconds: 15
          # No CPU / mem limits on the single-node host running essential
          # infra; minimal requests so the scheduler keeps headroom.
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
      volumes:
        - { name: lib-modules,  hostPath: { path: /lib/modules } }
        - { name: usr-src,      hostPath: { path: /usr/src } }
        - { name: sys,          hostPath: { path: /sys } }
        - { name: proc,         hostPath: { path: /proc } }
        - { name: dev,          hostPath: { path: /dev } }
        - { name: etc-modprobe, hostPath: { path: /etc/modprobe.d } }
        - { name: etc-group,    hostPath: { path: /etc/group, type: File } }
        - { name: lib-firmware, hostPath: { path: /lib/firmware } }
        # PC-3: hostPath so the readiness file is visible to other pods
        # on the same node (e.g. the device plugin's initContainer) and
        # to host-side must-gather.sh. DirectoryOrCreate so kubelet
        # mints the dir on first pod schedule; lives on /run (tmpfs)
        # so it's cleared by host reboot — correct semantics.
        - name: pc3-state
          hostPath:
            path: /run/nvidia/injector
            type: DirectoryOrCreate
  # PC-10: OnDelete prevents auto-replace of injector pods on DS manifest
  # changes. Driver reloads must be deliberate (admin runs kubectl delete
  # pod), not a side effect of editing an env var. NVIDIA gpu-operator
  # uses this exact strategy for its driver DS (G2 audit:
  # assets/state-driver/0500_daemonset.yaml + controllers/object_controls.go).
  updateStrategy:
    type: OnDelete
