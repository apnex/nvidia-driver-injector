# Local Docker test for nvidia-driver-injector.
#
# Usage:
#   docker compose build
#   docker compose up    # builds + loads nvidia.ko on the host
#   docker compose logs -f
#
# When done:
#   docker compose down  # stops the container; nvidia module STAYS LOADED
#                        # in host kernel (kernel modules persist past
#                        # container exit). To unload, use the explicit
#                        # uninstall subcommand:
#                        #   docker compose run --rm driver-injector uninstall
#
# Prerequisites on host (handled by `sudo ./scripts/apply.sh`
# in this repo — see docs/architecture.md):
#   - kernel cmdline tuning (iommu=off, host_reset=false, etc.)
#   - kernel-devel installed for $(uname -r)
#   - /etc/modprobe.d/nvidia-driver-injector.conf installed (production
#     NVreg options including LeverMRecoverEnable=1)
#   - nvidia-driver-injector-bridge-link-cap.service enabled
#     (runs Before=docker.service to apply Lever H17 cap)
#   - eGPU connected and authorised over Thunderbolt
#   - nvidia not already loaded by another deployment path
#     (the apnex/aorus-5090-egpu repo's apply.sh also loads it —
#     pick one geometry, not both)

services:
  driver-injector:
    build:
      context: .
      dockerfile: Dockerfile
    image: apnex/nvidia-driver-injector:refactor-rc1
    container_name: nvidia-driver-injector
    privileged: true
    pid: host
    volumes:
      # Host kernel build dir — needed for the build step
      - /lib/modules:/lib/modules:rw
      - /usr/src:/usr/src:ro
      # Host's PCI sysfs — needed for PCI gate + BAR1 verify
      - /sys:/sys:rw
      # /proc for kernel version detection
      - /proc:/proc
      # /dev for char-device creation (nvidia-modprobe -u -c 0)
      - /dev:/dev
      # Host modprobe.d — read-only, lets the container's modprobe
      # apply production NVreg options (LeverMRecoverEnable=1, etc.).
      # WITHOUT this mount, the entrypoint falls back to insmod with
      # no options and the recovery state machine is OFF (Gap #1 in
      # docs/architecture.md). Layer 1 apply.sh installs the
      # config file this picks up.
      - /etc/modprobe.d:/etc/modprobe.d:ro
      # Host /etc/group so the container can resolve the gpu gid
      # for chgrp on /dev/nvidia* (Gap #4).
      - /etc/group:/etc/group:ro
      # Host /lib/firmware writable so the entrypoint can create the
      # versioned firmware symlink ($NVIDIA_VERSION → 595.71.05) for
      # the kernel's request_firmware path. Without this, every
      # version-bump patch needs a manual symlink. See entrypoint.sh
      # "firmware path link" step.
      - /lib/firmware:/lib/firmware:rw
    restart: unless-stopped
    # Optional environment overrides (rare custom topology)
    # environment:
    #   EGPU_VENDOR_ID: "0x10de"
    #   EGPU_DEVICE_ID: "0x2b85"
    #   EGPU_BDF: "0000:04:00.0"
