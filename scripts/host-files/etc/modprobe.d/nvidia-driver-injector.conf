# /etc/modprobe.d/nvidia-driver-injector.conf
#
# Production posture for the patched NVIDIA driver loaded by the
# injector container.
#
# Two-layer defence against accidental load:
#   - blacklist: honoured by udev/modalias autoload paths
#   - install ... /bin/false: makes any explicit `modprobe nvidia*`
#     a no-op unless --ignore-install is passed
#
# The injector container's entrypoint loads the patched module
# explicitly with `modprobe --ignore-install nvidia`, which bypasses
# the install lines but still consumes the `options` lines below.
# That gives us a clean separation: the host posture is "nothing
# auto-loads nvidia", the container posture is "we know what we're
# doing, here's the patched build with production options".

blacklist nvidia
blacklist nvidia_modeset
blacklist nvidia_uvm
blacklist nvidia_drm

install nvidia /bin/false
install nvidia_modeset /bin/false
install nvidia_uvm /bin/false
install nvidia_drm /bin/false

# Keep nvidia_drm from registering a DRM/KMS device even if it ever
# does load. Compute-only host — no display output expected.
options nvidia_drm modeset=0 fbdev=0

# Device-file permissions applied at module-load time. This is the
# load-bearing mechanism (vs the container's belt-and-suspenders
# chmod): nvidia-modprobe (called implicitly by libnvidia-ml callers)
# uses these defaults, so it won't reset our 0660 root:ollama back
# to 0666 root:root. GID 968 == 'ollama' on this host; install-host.sh
# updates this if your host's ollama gid differs.
options nvidia NVreg_DeviceFileMode=0660 NVreg_DeviceFileUID=0 NVreg_DeviceFileGID=968

# Compute-only / headless server hardening.
#   DynamicPowerManagement=0x00 — disable driver-level runtime PM
#   PreserveVideoMemoryAllocations=0 — no save/restore VRAM across suspend
#   EnableS0ixPowerManagement=0 — disable Intel modern-standby integration
#   RestrictProfilingToAdminUsers=1 — nvprof / nsys / cupti require root
options nvidia NVreg_DynamicPowerManagement=0x00
options nvidia NVreg_PreserveVideoMemoryAllocations=0
options nvidia NVreg_EnableS0ixPowerManagement=0
options nvidia NVreg_RestrictProfilingToAdminUsers=1

# Lever A — force the driver to treat this GPU as external (eGPU),
# bypassing TB-bridge whitelist that doesn't include TB4/TB5 hubs.
# Without this, the driver runs power-management code intended for
# internal GPUs, which has been observed causing instability over TB
# (see NVIDIA/open-gpu-kernel-modules#979).
options nvidia NVreg_RegistryDwords="RmForceExternalGpu=1"

# Lever M-recover — arm the in-driver recovery state machine. Default
# in patches/0024 is 0 (off); production posture is 1 (on). With this,
# AER errors during GSP boot trigger pcie_err_handlers → bus reset →
# clean re-init or DISCONNECT. Without it, a PCIe transient during
# rmInit leaves the GPU permanently lost-from-bus until reboot.
#
# Empirical context (2026-05-10): a reboot on this hardware with
# RecoverEnable=0 hit Mode B silent wedge during GSP_INIT_DONE poll;
# AER fired, no handler engaged, GPU offline until reboot. With
# RecoverEnable=1 the same failure is recoverable in-driver.
options nvidia NVreg_TbEgpuLeverMRecoverEnable=1
